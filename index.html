<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Méthaniseur Tycoon"/>
  <meta name="theme-color" content="#060E15"/>
  <title>Méthaniseur Tycoon — GRDF</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-512.png"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #060E15; }
    body { min-height: 100vh; overflow-x: hidden; }
    #root { min-height: 100vh; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #splash {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: #060E15; color: #4A9EDB;
      font-family: sans-serif; font-size: 18px;
      flex-direction: column; gap: 16px;
    }
    #splash-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(74,158,219,.2);
      border-top-color: #4A9EDB;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-spinner"></div>
    <span>Chargement…</span>
  </div>
  <div id="root" style="display:none"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel" src="methaniseur.jsx" data-presets="react"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
