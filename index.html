// ─────────────────────────────────────────────────────────────────────────────
// 🔌 SUPABASE REALTIME — WebSocket Phoenix + fallback polling
// ─────────────────────────────────────────────────────────────────────────────
function useSupabaseRealtime(onPlayerChange, active) {
  const [rtStatus, setRtStatus] = useState("disconnected");
  const onChangeRef = useRef(onPlayerChange);
  const wsRef = useRef(null);
  const refCounter = useRef(1);
  const heartbeatRef = useRef(null);
  const reconnectRef = useRef(null);
  const pollRef = useRef(null);
  const prevSigRef = useRef(null);
  const wsFailedRef = useRef(false);
  useEffect(() => { onChangeRef.current = onPlayerChange; }, [onPlayerChange]);

  // ── Polling fallback ──
  const startPolling = useCallback(() => {
    if (pollRef.current) return;
    const poll = () => {
      fetch(
        SUPABASE_URL + "/rest/v1/players?select=id,score_network,score_gnv,is_connected&order=updated_at.desc&limit=30",
        { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } }
      ).then(r => r.json()).then(rows => {
        setRtStatus("connected");
        const sig = JSON.stringify(rows.map(r => r.id + ":" + r.score_network + ":" + r.score_gnv));
        if (prevSigRef.current && sig !== prevSigRef.current && onChangeRef.current) {
          onChangeRef.current(rows);
        }
        prevSigRef.current = sig;
      }).catch(() => { setRtStatus("error"); });
    };
    poll();
    pollRef.current = setInterval(poll, 8000);
  }, []);

  const stopPolling = useCallback(() => {
    if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
  }, []);

  // ── WebSocket ──
  const connectWs = useCallback(() => {
    if (!SUPABASE_KEY || SUPABASE_URL.includes("VOTRE_PROJECT_ID")) return;
    if (wsRef.current && wsRef.current.readyState < 2) return;

    setRtStatus("connecting");
    const projectRef = SUPABASE_URL.replace("https://","").replace(".supabase.co","");
    const url = `wss://${projectRef}.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_KEY}&vsn=1.0.0`;

    let ws;
    try { ws = new WebSocket(url); } catch { wsFailedRef.current = true; startPolling(); return; }
    wsRef.current = ws;

    const timeout = setTimeout(() => {
      if (ws.readyState !== 1) { ws.close(); wsFailedRef.current = true; startPolling(); }
    }, 5000);

    ws.onopen = () => {
      clearTimeout(timeout);
      stopPolling();
      const joinRef = String(refCounter.current++);
      const msgRef  = String(refCounter.current++);
      ws.send(JSON.stringify({
        topic: "realtime:public:players",
        event: "phx_join",
        payload: {
          config: {
            broadcast: { self: false },
            presence: { key: "" },
            postgres_changes: [{ event: "*", schema: "public", table: "players" }]
          }
        },
        ref: msgRef, join_ref: joinRef
      }));
      heartbeatRef.current = setInterval(() => {
        if (ws.readyState === 1) {
          ws.send(JSON.stringify({ topic:"phoenix", event:"heartbeat", payload:{}, ref:String(refCounter.current++), join_ref:null }));
        }
      }, 29000);
    };

    ws.onmessage = (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        if (msg.event === "phx_reply" && msg.payload?.status === "ok" && msg.topic !== "phoenix") {
          setRtStatus("connected");
        }
        if (msg.event === "postgres_changes") {
          const data = msg.payload?.data;
          if (data && onChangeRef.current) onChangeRef.current(data);
        }
      } catch {}
    };

    ws.onerror = () => {
      clearTimeout(timeout);
      wsFailedRef.current = true;
      startPolling();
    };

    ws.onclose = () => {
      if (heartbeatRef.current) clearInterval(heartbeatRef.current);
      if (wsFailedRef.current) {
        startPolling();
      } else {
        setRtStatus("disconnected");
        reconnectRef.current = setTimeout(connectWs, 3000);
      }
    };
  }, [startPolling, stopPolling]);

  // ── Lifecycle ──
  useEffect(() => {
    if (!active || !SUPABASE_KEY || SUPABASE_URL.includes("VOTRE_PROJECT_ID")) {
      setRtStatus("disconnected");
      return;
    }
    wsFailedRef.current = false;
    connectWs();
    return () => {
      if (heartbeatRef.current) clearInterval(heartbeatRef.current);
      if (reconnectRef.current) clearTimeout(reconnectRef.current);
      stopPolling();
      if (wsRef.current) { wsRef.current.onclose = null; wsRef.current.close(); wsRef.current = null; }
    };
  }, [active, connectWs, stopPolling]);

  return rtStatus;
}

  return raw < 10 ? parseFloat(raw.toFixed(2)) : Math.floor(raw);
};
const getMultiCost = (u, q, n) => {
  let total = 0;
  for (let k = 0; k < n; k++) total += getCost(u, q + k);
  return total;
};
const getMaxBuy = (u, q, budget) => {
  let n = 0, total = 0;
  while (true) {
    const c = getCost(u, q + n);
    if (total + c > budget) break;
    total += c; n++;
    if (n > 9999) break;
  }
  return n;
};

  const [mode, setMode] = useState(() => { try { return localStorage.getItem('mt-theme')||'dark'; } catch { return 'dark'; } });
  useEffect(() => { try { localStorage.setItem('mt-theme', mode); } catch {} }, [mode]);

  return (<ThemeCtx.Provider value={{ mode, toggle, T }}>{children}</ThemeCtx.Provider>);
}

function Game({ username, region }) {
  const {mode: themeMode, T} = useTheme();
  const isL = themeMode === 'light';

  const SAVE_KEY = `mt_save_${username}`;
  const loadSave = () => { try { const r=localStorage.getItem(SAVE_KEY); return r?JSON.parse(r):null; } catch{return null;} };
  const saved = loadSave();

  const calcOffline = (sv) => {
    if (!sv?.lastSaved) return null;
    const elapsedSec = Math.min((Date.now()-sv.lastSaved)/1000, 86400);
    if (elapsedSec < 60) return null;
    const fr = (sv.owned||[0,0,0,0,0,0,0]).reduce((a,q,i)=>a+UPGRADES[i].baseFill*q,0);
    if (fr <= 0) return null;
    const produced = Math.floor(fr * elapsedSec) * 0.006;
    if (produced < 0.01) return null;
    return { elapsedSec, produced, injected: sv.injected||false };
  };
  const offlineGains = saved ? calcOffline(saved) : null;
  const [offlineModal, setOfflineModal] = useState(!!offlineGains);

  // ── ÉTAT ────────────────────────────────────────────────────────────────────
  const [tab,     setTab]     = useState("game");
  const [rankTab, setRankTab] = useState("individuel"); // "individuel" | "regions"
  const [mo,      setMo]      = useState(saved?.mo      ?? 0);
  const [bm,      setBm]      = useState(() => {
    const base = saved?.bm ?? 0;
    return offlineGains?.injected ? base+(offlineGains.produced||0) : base;
  });
  const [buffer,  setBuffer]  = useState(() => {
    const base = saved?.buffer ?? 1;
    if (!offlineGains||offlineGains.injected) return base;
    return Math.min(INJECTION_THRESHOLD, base+(offlineGains.produced||0));
  });
  const [tutStep, setTutStep] = useState(saved?.tutStep ?? 0);
  const [owned,   setOwned]   = useState(saved?.owned   ?? [0,0,0,0,0,0,0]);

  const [stock,   setStock]   = useState(saved?.stock   ?? 0);
  const [pouring, setPouring] = useState(false);
  const [pourProg,setPourProg]= useState(0);

  const [charge,    setCharge]    = useState(saved?.charge    ?? 0);
  const [bubbles, setBubbles] = useState([]);

  const [epurateurOk,  setEpurateurOk]  = useState(saved?.epurateurOk  ?? false);
  const [compresseurOk,setCompresseurOk]= useState(saved?.compresseurOk ?? false);
  const [injected,     setInjected]     = useState(saved?.injected     ?? false);
  const [unlockAnim,    setUnlockAnim]   = useState(null);
  const [sceneZoomAnim, setSceneZoomAnim] = useState(false);

  // ── GNV STATE ──
  const [gnvStations, setGnvStations] = useState(saved?.gnvStations ?? 0);
  const [gnvSplit,    setGnvSplit]    = useState(saved?.gnvSplit    ?? 20);
  const [gnvBm,       setGnvBm]       = useState(saved?.gnvBm       ?? 0);
  const [tractorGnv,  setTractorGnv]  = useState(saved?.tractorGnv  ?? false);
  const [digesteurs,  setDigesteurs]  = useState(saved?.digesteurs  ?? 1);

  const [scoreF,      setScoreF]    = useState([]);
  const [notif,       setNotif]     = useState(null);
  const [leaderboard, setLb]        = useState(MOCK_LB);
  const [lbLoading,   setLbLoading] = useState(false);
  const [lbLastUpdate,setLbLastUp]  = useState(null);
  const [lbPrevRanks, setLbPrev]    = useState({});

  // ── STATS RÉGIONALES SUPABASE ─────────────────────────────────────────────
  const [regionalStats, setRegionalStats] = useState(null);
  const [regionalLoading, setRegionalLoading] = useState(false);

  const loadRegional = useCallback(() => {
    setRegionalLoading(true);
    fetchRegionalStats().then(data => {
      if (data) setRegionalStats(data);
      setRegionalLoading(false);
    });
  }, []);

  const loadLeaderboard = useCallback(() => {
    setLbLoading(true);
    fetchIndividualLeaderboard().then(rows => {
      if (rows && rows.length > 0) {
        const prevMap = {};
        leaderboard.forEach((e, i) => { prevMap[e.name] = i; });
        setLbPrev(prevMap);
        const hasMe = rows.some(r => r.name === username);
        const merged = hasMe ? rows : [
          ...rows,
          { name: username, region, score: bm + gnvBm, scoreNet: bm, scoreGnv: gnvBm }
        ].sort((a,b) => b.score - a.score);
        setLb(merged.slice(0, 15));
      }
      setLbLastUp(Date.now());
      setLbLoading(false);
    });
  }, [username, region, bm, gnvBm, leaderboard]);

  // ── SUPABASE REALTIME ─────────────────────────────────────────────────────
  const handleRealtimeChange = useCallback((change) => {
    // Un joueur a été inséré ou mis à jour → refresh les données
    loadLeaderboard();
    loadRegional();
  }, [loadLeaderboard, loadRegional]);

  const rtStatus = useSupabaseRealtime(handleRealtimeChange, tab === "ranking");

  // Initial fetch when tab opens
  useEffect(() => {
    if (tab !== "ranking") return;
    loadLeaderboard();
    loadRegional();
  }, [tab]);

  // ── SAUVEGARDE AUTO ────────────────────────────────────────────────────────
  const stateRef = useRef({});
  useEffect(() => {
    stateRef.current = { mo,bm,buffer,tutStep,owned,stock,charge,epurateurOk,compresseurOk,injected,gnvStations,gnvSplit,gnvBm,tractorGnv,digesteurs };
  });
  const saveGame = useCallback(() => {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify({...stateRef.current,lastSaved:Date.now(),username,region})); } catch{}
  }, [SAVE_KEY]);
  useEffect(() => { const id=setInterval(saveGame,15000); return ()=>clearInterval(id); }, [saveGame]);
  useEffect(() => {
    const onHide = () => saveGame();
    window.addEventListener('beforeunload', onHide);
    document.addEventListener('visibilitychange', onHide);
    return () => { window.removeEventListener('beforeunload',onHide); document.removeEventListener('visibilitychange',onHide); };
  }, [saveGame]);

  // ── UPSERT SUPABASE toutes les 30s ────────────────────────────────────────
  const bmRef       = useRef(bm);
  const gnvBmRef    = useRef(gnvBm);
  const injectedRef = useRef(injected);
  useEffect(() => { bmRef.current = bm; }, [bm]);
  useEffect(() => { gnvBmRef.current = gnvBm; }, [gnvBm]);
  useEffect(() => { injectedRef.current = injected; }, [injected]);

  useEffect(() => {
    const id = setInterval(() => {
      supabaseUpsert({
        id: `${username}_${region}`.toLowerCase().replace(/\s+/g,'_'),
        username,
        region,
        score_network: bmRef.current,
        score_gnv: gnvBmRef.current,
        is_connected: injectedRef.current,
      });
    }, 30000);
    return () => clearInterval(id);
  }, [username, region]);

  // ── Dérivés ────────────────────────────────────────────────────────────────
  const gnvBonus      = tractorGnv ? 1.15 : 1;
  const fillRate      = owned.reduce((a,q,i) => a+UPGRADES[i].baseFill*q, 0) * gnvBonus;
  const burnRate      = fillRate;
  const chargeMaxEff    = CHARGE_MAX * digesteurs;   // capacité digesteur x nb digesteurs
  const burnRateEff   = burnRate * digesteurs;   // débit de transformation x nb digesteurs
  const stockMax    = owned.reduce((a,q,i) => a+UPGRADES[i].bagCap*q, 0);
  const stockPct    = stockMax > 0 ? stock/stockMax : 0;
  const fillPenalty = stockPct>=1?0:stockPct>=.8?.4:1;
  const isDigesting = charge > 0;
  const chargePct     = charge/chargeMaxEff;
  const bufferPct   = Math.min(1, buffer/INJECTION_THRESHOLD);

  const canUnlockEpurateur   = !epurateurOk  && buffer>=200;
  const canUnlockCompresseur = !compresseurOk && epurateurOk && buffer>=350;
  const canConnect           = !injected && compresseurOk && epurateurOk && buffer>=INJECTION_THRESHOLD && owned[4]>=1;

  const stockColor = stockPct>=1?"#E05858":stockPct>=.8?"#E07820":stockPct>=.5?"#eab308":"#4A9EDB";
  const isUpgradeAvailable = i => {
    const u=UPGRADES[i];
    if (u.unlocksAt===null)          return true;
    if (u.unlocksAt==="epurateur")   return epurateurOk;
    if (u.unlocksAt==="compresseur") return compresseurOk;
    if (u.unlocksAt==="injected")    return injected;
    return false;
  };
  const totalScore      = bm + gnvBm;
  const wallet          = injected ? bm : buffer;
  const canBuySomething = UPGRADES.some((u,i)=>wallet>=getCost(u,owned[i])&&isUpgradeAvailable(i));

  const bmPerSecond = isDigesting ? (burnRateEff*0.006)/1 : 0;
  const bmPerHour   = bmPerSecond*3600;

  const fmtETA = (current, target, perHour) => {
    if (perHour<=0) return "∞";
    const hours = (target-current)/perHour;
    if (hours<1/60) return "< 1 min";
    if (hours<1)    return `${Math.ceil(hours*60)} min`;
    if (hours<24)   return `${hours.toFixed(1).replace(".",",")}h`;
    return `${Math.floor(hours/24)}j ${Math.round(hours%24)}h`;
  };

  const showNotif = msg => { setNotif(msg); setTimeout(()=>setNotif(null),4000); };

  // ── TICKS ──────────────────────────────────────────────────────────────────
  useEffect(()=>{
    if (fillRate<=0) return;
    const id=setInterval(()=>setStock(s=>Math.min(stockMax,s+(fillRate*fillPenalty)/20)),50);
    return ()=>clearInterval(id);
  },[fillRate,fillPenalty]);

  useEffect(()=>{
    if (burnRateEff<=0) return;
    const id=setInterval(()=>{
      setCharge(f=>{
        if (f<=0) return 0;
        const burn=burnRateEff/20;
        const actual=Math.min(f,burn);
        setMo(m=>m+actual);
        return f-actual;
      });
    },50);
    return ()=>clearInterval(id);
  },[burnRateEff]);

  useEffect(()=>{
    const id=setInterval(()=>{
      setMo(m=>{
        if (m<1) return m;
        const n=Math.floor(m/1);
        const produced=n*0.006;
        if (injected) {
          if (gnvStations>0 && gnvSplit>0) {
            const toGnv = produced*(gnvSplit/100);
            const toNet = produced-toGnv;
            setBm(b=>b+toNet);
            setGnvBm(b=>b+toGnv);
          } else {
            setBm(b=>b+produced);
          }
        } else {
          setBuffer(b=>Math.min(INJECTION_THRESHOLD,b+produced));
        }
        return m-n*100;
      });
    },400);
    return ()=>clearInterval(id);
  },[injected,gnvStations,gnvSplit]);

  useEffect(()=>{
    const rate=isDigesting?Math.max(150,900-chargePct*700):1200;
    const id=setInterval(()=>{
      const b={id:uid++,x:15+Math.random()*70,dur:.9+Math.random()*1.4,size:5+Math.random()*9};
      setBubbles(p=>[...p.slice(-18),b]);
      setTimeout(()=>setBubbles(p=>p.filter(x=>x.id!==b.id)),(b.dur+.2)*1000);
    },rate);
    return ()=>clearInterval(id);
  },[isDigesting,chargePct]);

  // Mise à jour position locale dans le lb sans fetch réseau
  useEffect(() => {
    setLb(prev => {
      const without = prev.filter(e => e.name !== username);
      return [...without, {name:username,region,score:totalScore,scoreNet:bm,scoreGnv:gnvBm,isMe:true}]
        .sort((a,b) => b.score - a.score).slice(0,15);
    });
  }, [totalScore, username, region]);

  // ── DÉVERSER ───────────────────────────────────────────────────────────────
  const handlePour = useCallback(()=>{
    if (pouring||stock<1) return;
    const dumped=stock;
    setPouring(true);
    let start=null;
    const DUR=1100;
    const tick=ts=>{
      if (!start) start=ts;
      const t=Math.min(1,(ts-start)/DUR);
      setPourProg(t);
      if (t<1) { requestAnimationFrame(tick); }
      else {
        setPouring(false); setPourProg(0); setStock(0);
        const added=dumped;
        setCharge(f=>Math.min(chargeMaxEff,f+added));
        const sf={id:uid++,val:`+${fmtT(added)} dans le digesteur !`};
        setScoreF(p=>[...p,sf]);
        setTimeout(()=>setScoreF(p=>p.filter(x=>x.id!==sf.id)),2200);
        if (tutStep===2) setTutStep(3);
      }
    };
    requestAnimationFrame(tick);
  },[pouring,stock]);

  // ── DÉBLOCAGE ──────────────────────────────────────────────────────────────
  const triggerAnim = (id, cb) => { setUnlockAnim(id); setTimeout(()=>{ setUnlockAnim(null); cb(); },900); };

  const handleUnlockEpurateur = () => {
    if (!canUnlockEpurateur) return;
    triggerAnim("epurateur",()=>{ setEpurateurOk(true); showNotif("🧪 Épurateur activé ! Biodéchets et boues de STEP débloqués !"); });
  };
  const handleUnlockCompresseur = () => {
    if (!canUnlockCompresseur) return;
    triggerAnim("compresseur",()=>{ setCompresseurOk(true); showNotif("🔩 Compresseur activé ! Déchets industriels débloqués !"); });
  };
  const handleConnect = () => {
    if (!canConnect) return;
    triggerAnim("injection",()=>{
      setInjected(true);
      setBm(b=>b+buffer);
      setBuffer(0);
      showNotif("🎉 Raccordement GRDF réussi ! CIVE et Parc biogaz+ débloqués !");
      // Upsert immédiat au raccordement
      supabaseUpsert({
        id:`${username}_${region}`.toLowerCase().replace(/\s+/g,'_'),
        username, region,
        score_network: bm+buffer,
        score_gnv: 0,
        is_connected: true,
        connected_at: new Date().toISOString(),
      });
    });
  };

  // ── DIGESTEUR HANDLERS ────────────────────────────────────────────────────────
  const handleBuyDigesteur = () => {
    if (digesteurs >= 3) return;
    const cost = DIGESTEUR_COSTS[digesteurs - 1];
    if (bm < cost) return;
    setBm(b => b - cost);
    setDigesteurs(d => d + 1);
    setSceneZoomAnim(true);
    setTimeout(() => setSceneZoomAnim(false), 1200);
    const sf = {id:uid++, val:`⚗️ Digesteur ${digesteurs+1} opérationnel !`};
    setScoreF(p => [...p, sf]);
    setTimeout(() => setScoreF(p => p.filter(x => x.id !== sf.id)), 2200);
    showNotif(`⚗️ Digesteur ${digesteurs+1} activé ! Capacité ×${digesteurs+1} — production boostée !`);
  };

  // ── GNV HANDLERS ──────────────────────────────────────────────────────────────
  const handleBuyGnvStation = () => {
    if (gnvStations>=3) return;
    const cost=GNV_STATION_COSTS[gnvStations];
    if (bm<cost) return;
    setBm(b=>b-cost);
    setGnvStations(s=>s+1);
    const sf={id:uid++,val:`⛽ Station GNV ${gnvStations+1} opérationnelle !`};
    setScoreF(p=>[...p,sf]);
    setTimeout(()=>setScoreF(p=>p.filter(x=>x.id!==sf.id)),2200);
    showNotif(`⛽ Station GNV ${gnvStations+1} activée — vos premiers véhicules arrivent !`);
  };

  const handleBuyTractorGnv = () => {
    if (tractorGnv||bm<2000) return;
    setBm(b=>b-2000);
    setTractorGnv(true);
    showNotif("🚜 Tracteur GNV activé ! +15% de remplissage sur tous les intrants — boucle vertueuse !");
  };

  // ── ACHATS ─────────────────────────────────────────────────────────────────
  const buyUpgrade = i => {
    if (!isUpgradeAvailable(i)) return;
    const cost=getCost(UPGRADES[i],owned[i]);
    if (wallet<cost) return;
    if (injected) { setBm(b=>b-cost); } else { setBuffer(b=>b-cost); }
    setOwned(p=>{ const n=[...p]; n[i]++; return n; });
    const sf={id:uid++,val:`-${fmt(cost)} investis`};
    setScoreF(p=>[...p,sf]);
    setTimeout(()=>setScoreF(p=>p.filter(x=>x.id!==sf.id)),1800);
    if (tutStep===1) { setTutStep(2); setTab("game"); }
  };

  const buyMulti = (i, count) => {
    if (!isUpgradeAvailable(i)) return;
    const actual = count === "max" ? getMaxBuy(UPGRADES[i], owned[i], wallet) : Math.min(count, getMaxBuy(UPGRADES[i], owned[i], wallet));
    if (actual <= 0) return;
    const totalCost = getMultiCost(UPGRADES[i], owned[i], actual);
    if (wallet < totalCost) return;
    if (injected) { setBm(b => b - totalCost); } else { setBuffer(b => b - totalCost); }
    setOwned(p => { const n = [...p]; n[i] += actual; return n; });
    const sf = { id: uid++, val: `×${actual} — ${fmt(totalCost)}` };
    setScoreF(p => [...p, sf]);
    setTimeout(() => setScoreF(p => p.filter(x => x.id !== sf.id)), 1800);
    if (tutStep === 1 && i === 0) { setTutStep(2); setTab("game"); }
  };

  const binRotate = pouring?35*pourProg:0;
  const binTransX = pouring?18*pourProg:0;

  // ── RENDER ──────────────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",maxWidth:"480px",margin:"0 auto",
      background:"linear-gradient(180deg,#0B1623 0%,#0F1E2E 100%)",
      fontFamily:"'Segoe UI',system-ui,sans-serif",color:"#FFFFFF",
      position:"relative",userSelect:"none",touchAction:"pan-y"}}>

      <style>{`
        * { -webkit-font-smoothing: antialiased; }
        button { -webkit-tap-highlight-color: transparent; }
        @keyframes digestPulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.04);filter:brightness(1.15)}}
        .scanline::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(74,158,219,.018) 2px,rgba(74,158,219,.018) 4px);pointer-events:none;border-radius:inherit;}
        .neon{text-shadow:0 0 10px currentColor,0 0 30px currentColor;}
        @keyframes fallWaste{0%{transform:translateY(-30px) rotate(0deg) scale(1.1);opacity:1}70%{opacity:.9}100%{transform:translateY(105px) rotate(400deg) scale(0.1);opacity:0}}
        @keyframes bubbleUp{0%{transform:translateY(0) scale(1);opacity:.75}100%{transform:translateY(-90px) scale(.1);opacity:0}}
        @keyframes waveSurface{0%,100%{border-radius:50% 50% 0 0/8px}50%{border-radius:45% 55% 0 0/6px}}
        @keyframes flowDot{0%{opacity:0;transform:translateX(-4px)}50%{opacity:1}100%{opacity:0;transform:translateX(4px)}}
        @keyframes scoreFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.2)}}
        @keyframes blinkBorder{0%,100%{border-color:rgba(224,88,88,.35)}50%{border-color:rgba(224,88,88,.9);box-shadow:0 0 18px rgba(224,88,88,.4)}}
        @keyframes dumpFly{0%{transform:translate(0,0) rotate(0deg) scale(1);opacity:1}60%{opacity:.8}100%{transform:translate(-28px,32px) rotate(200deg) scale(.3);opacity:0}}
        @keyframes loadFall{0%{transform:translateY(0) scale(1.1);opacity:1}70%{opacity:.7}100%{transform:translateY(52px) scale(.5);opacity:0}}
        @keyframes chargePulse{0%,100%{opacity:.7}50%{opacity:1}}
        @keyframes eqActivate{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
        @keyframes connectGlow{0%,100%{box-shadow:0 0 10px rgba(74,158,219,.32)}50%{box-shadow:0 0 30px rgba(74,158,219,.95)}}
        @keyframes slideNotif{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
        @keyframes riseIn{0%{opacity:0;transform:translateY(16px) scale(.97)}100%{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes bufferPulse{0%,100%{opacity:.8}50%{opacity:1}}
        @keyframes digitRollUp{0%{transform:translateY(0);opacity:1}40%{transform:translateY(-60%);opacity:.4}41%{transform:translateY(60%);opacity:.4}100%{transform:translateY(0);opacity:1}}
        @keyframes digitRollDown{0%{transform:translateY(0);opacity:1}40%{transform:translateY(60%);opacity:.4}41%{transform:translateY(-60%);opacity:.4}100%{transform:translateY(0);opacity:1}}
        @keyframes meterGlow{0%,100%{box-shadow:0 0 12px rgba(74,158,219,.22)}50%{box-shadow:0 0 24px rgba(74,158,219,.55)}}
        @keyframes pedagoIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
        @keyframes shimmer{0%{opacity:.4}50%{opacity:1}100%{opacity:.4}}
        @keyframes dezoom{0%{transform:scale(1)}30%{transform:scale(0.91)}70%{transform:scale(1.02)}100%{transform:scale(1)}}
        @keyframes digesteurAppear{0%{opacity:0;transform:scale(0.5) translateY(20px)}60%{transform:scale(1.06) translateY(-4px)}100%{opacity:1;transform:scale(1) translateY(0)}}
        @keyframes sceneFlash{0%{box-shadow:0 0 0px rgba(74,158,219,0)}50%{box-shadow:0 0 60px rgba(74,158,219,.8),inset 0 0 40px rgba(74,158,219,.15)}100%{box-shadow:0 0 0px rgba(74,158,219,0)}}
      `}</style>

      {/* Modal hors-ligne */}
      {offlineModal && offlineGains && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,padding:"20px"}} onClick={()=>setOfflineModal(false)}>
          <div style={{background:isL?"#FFFFFF":"#162436",border:"1px solid "+(isL?"rgba(25,75,150,.2)":"rgba(74,158,219,.3)"),borderRadius:"20px",padding:"28px 24px",maxWidth:"320px",width:"100%",animation:"riseIn .4s ease"}} onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center",marginBottom:"16px"}}>
              <div style={{fontSize:"40px",marginBottom:"8px"}}>⏰</div>
              <div style={{fontSize:"17px",fontWeight:800,color:isL?"#0C1A2E":"#EDF4FF"}}>Production hors-ligne</div>
              <div style={{fontSize:"12px",marginTop:"4px",color:isL?"#3A5270":"rgba(160,200,240,.65)"}}>
                Absence : {offlineGains.elapsedSec>=3600?`${Math.floor(offlineGains.elapsedSec/3600)}h ${Math.round((offlineGains.elapsedSec%3600)/60)}min`:`${Math.round(offlineGains.elapsedSec/60)} min`}
              </div>
            </div>
            <div style={{background:"rgba(74,158,219,.1)",border:"1px solid rgba(74,158,219,.25)",borderRadius:"12px",padding:"16px",textAlign:"center",marginBottom:"16px"}}>
              <div style={{fontSize:"11px",fontWeight:600,letterSpacing:".06em",textTransform:"uppercase",color:"rgba(160,200,240,.65)",marginBottom:"6px"}}>Biométhane produit</div>
              <div style={{fontSize:"28px",fontWeight:800,color:"#4A9EDB"}}>+{fmt(offlineGains.produced)}</div>
              <div style={{fontSize:"11px",marginTop:"4px",color:"rgba(120,165,210,.42)"}}>ajoutés à votre {offlineGains.injected?"réseau GRDF":"cuve tampon"}</div>
            </div>
            <button onClick={()=>setOfflineModal(false)} style={{width:"100%",padding:"12px",borderRadius:"10px",border:"none",background:"linear-gradient(135deg,#2A7DBB,#4A9EDB)",color:"white",fontWeight:800,fontSize:"14px",cursor:"pointer"}}>✅ Reprendre le jeu</button>
          </div>
        </div>
      )}

      {/* Score floats */}
      {scoreF.map(f=>(
        <div key={f.id} style={{position:"fixed",top:"35%",left:"50%",transform:"translateX(-50%)",color:"#6DB5EC",fontWeight:800,fontSize:"17px",animation:"scoreFloat 2.2s ease forwards",pointerEvents:"none",zIndex:300,whiteSpace:"nowrap"}}>{f.val}</div>
      ))}

      {/* Notif */}
      {notif&&<div style={{position:"fixed",top:"16px",left:"50%",background:"linear-gradient(135deg,#2A7DBB,#4A9EDB)",color:"white",padding:"12px 22px",borderRadius:"30px",fontWeight:700,fontSize:"13px",zIndex:999,whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(74,158,219,.55)",maxWidth:"90vw",textAlign:"center",animation:"slideNotif .3s ease"}}>{notif}</div>}

      {/* Header */}
      <div style={{background:"rgba(11,22,35,.7)",backdropFilter:"blur(10px)",padding:"14px 20px 10px",borderBottom:"1px solid rgba(74,158,219,.12)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:"11px",color:"rgba(255,255,255,.55)"}}>⚗️ {username} · {region}</div>
            <div style={{fontSize:"10px",color:"rgba(255,255,255,.35)",marginTop:"1px"}}>
              {injected?"🔌 Raccordé réseau GRDF":`🫙 Cuve : ${fmt(buffer)} / ${fmt(INJECTION_THRESHOLD)}`}
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"10px",color:"rgba(255,255,255,.45)",textTransform:"uppercase",letterSpacing:".05em"}}>{injected?"Biométhane injecté":"En attente injection"}</div>
            <div style={{fontSize:"20px",fontWeight:800,color:injected?"#4A9EDB":"rgba(255,255,255,.45)",letterSpacing:"-.5px"}}>{injected?fmt(totalScore):"—"}</div>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",background:"rgba(11,22,35,.55)",borderBottom:"1px solid rgba(74,158,219,.09)"}}>
        {[["game","⚗️ Digesteur"],["upgrades","⬆️ Achats"],["ranking","🏆 Classement"]].map(([id,lbl])=>{
          const highlight=id==="upgrades"&&canBuySomething&&tab!=="upgrades";
          return (
            <button key={id} onClick={()=>{ setTab(id); if(id==="upgrades"&&tutStep===0) setTutStep(1); }} style={{
              flex:1,padding:"11px 4px",border:"none",
              background:highlight?"rgba(74,158,219,.14)":"transparent",
              color:tab===id?"#4A9EDB":highlight?"#6DB5EC":"rgba(255,255,255,.35)",
              fontSize:"12px",fontWeight:tab===id||highlight?700:400,
              borderBottom:tab===id?"2px solid #4A9EDB":highlight?"2px solid rgba(74,158,219,.5)":"2px solid transparent",
              cursor:"pointer",position:"relative",transition:"all .3s"}}>
              {lbl}
              {highlight&&<span style={{position:"absolute",top:"6px",right:"10px",width:"7px",height:"7px",borderRadius:"50%",background:"#4A9EDB",boxShadow:"0 0 6px rgba(74,158,219,.95)"}}/>}
            </button>
          );
        })}
      </div>

      {/* ══ TAB DIGESTEUR ══ */}
      {tab==="game"&&(
        <div style={{padding:"16px 16px 30px"}}>

          {/* Flux */}
          <div style={{marginBottom:"16px",padding:"10px 12px",borderRadius:"12px",background:"rgba(74,158,219,.05)",border:"1px solid rgba(74,158,219,.09)"}}>
            <div style={{fontSize:"9px",color:"rgba(255,255,255,.45)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:"7px"}}>🔄 Flux de production</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"5px"}}>
              {[
                {label:"Upgrades",    icon:"⬆️",color:"#AA7700",dim:fillRate===0},
                {label:"Bac",         icon:"🗑️",color:"#4A9EDB",dim:stock<1},
                {label:"Digesteur",   icon:"⚗️",color:"#6DB5EC",dim:charge<1},
                {label:"MO",          icon:"♻️",color:"#A8CCEC",dim:mo<50},
                {label:"Cuve tampon", icon:"🫙",color:"#3AACCC",dim:buffer<1&&!injected},
                {label:"Réseau GRDF", icon:"🔌",color:"#4A9EDB",dim:!injected},
              ].map((s,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:"4px",padding:"4px 7px",borderRadius:"8px",background:`${s.color}${s.dim?"0a":"18"}`,border:`1px solid ${s.color}${s.dim?"18":"40"}`,transition:"all .5s"}}>
                  <span style={{fontSize:"11px"}}>{s.icon}</span>
                  <span style={{fontSize:"9px",fontWeight:600,color:s.dim?"rgba(255,255,255,.3)":s.color,transition:"color .5s",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.label}</span>
                  {!s.dim&&<span style={{marginLeft:"auto",width:"5px",height:"5px",borderRadius:"50%",background:s.color,flexShrink:0,boxShadow:`0 0 4px ${s.color}`}}/>}
                </div>
              ))}
            </div>
          </div>

          {/* Stats */}
          <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
            {[
              {icon:"🐄",label:"Remplissage",val:fillRate>0?fmtT(fillRate*fillPenalty)+"/s":"—"},
              {icon:"⚗️",label:"m³/heure",   val:isDigesting?fmt(bmPerHour):"—"},
              {icon:"💧",label:"m³ dispos",  val:fmt(wallet)},
            ].map(s=>(
              <div key={s.label} style={{flex:1,background:"rgba(74,158,219,.06)",border:"1px solid rgba(74,158,219,.12)",borderRadius:"10px",padding:"8px 6px",textAlign:"center"}}>
                <div style={{fontSize:"16px"}}>{s.icon}</div>
                <div style={{fontSize:"11px",fontWeight:700,color:"#6DB5EC",marginTop:"2px"}}>{s.val}</div>
                <div style={{fontSize:"9px",color:"rgba(255,255,255,.45)",marginTop:"1px"}}>{s.label}</div>

          </div>

          {/* Scene */}
          <DigesteurScene
            digesteurs={digesteurs}
            sceneZoomAnim={sceneZoomAnim}

            chargePct={chargePct}

            isDigesting={isDigesting}
            bmPerHour={bmPerHour}
            fillRate={fillRate}
            owned={owned}
            stock={stock}
            stockMax={stockMax}
            stockPct={stockPct}
            stockColor={stockColor}
            binRotate={binRotate}
            binTransX={binTransX}

          {/* Progression raccordement */}

            <div style={{marginTop:"14px",padding:"14px 16px",borderRadius:"16px",background:"rgba(11,22,35,.55)",border:`1px solid ${canConnect?"rgba(232,160,32,.45)":"rgba(74,158,219,.14)"}`}}>

                </div>

                  <div style={{fontSize:"20px",fontWeight:800,color:canConnect?"#F5BE50":"#4A9EDB"}}>{Math.round(bufferPct*100)}%</div>

              </div>
              <div style={{height:"14px",borderRadius:"7px",background:"rgba(74,158,219,.09)",overflow:"hidden",position:"relative"}}>
                <div style={{height:"100%",borderRadius:"7px",width:`${bufferPct*100}%`,background:canConnect?"linear-gradient(90deg,#C07800,#E8A020,#F5D888)":"linear-gradient(90deg,#0A1828,#3A8ECB,#6DB5EC)",transition:"width .5s ease,background .5s",animation:canConnect?"bufferPulse 1s ease infinite":"none",boxShadow:canConnect?"0 0 12px rgba(232,160,32,.55)":"none"}}/>
                {[25,50,75].map(pct=>(<div key={pct} style={{position:"absolute",top:0,bottom:0,left:`${pct}%`,width:"1px",background:"rgba(11,22,35,.55)"}}/>))}

              <div style={{display:"flex",justifyContent:"space-between",marginTop:"6px"}}>
                <span style={{fontSize:"9px",color:"rgba(255,255,255,.32)"}}>0 m³</span>
                <span style={{fontSize:"9px",color:"rgba(255,255,255,.32)"}}>{fmt(INJECTION_THRESHOLD/2)}</span>
                <span style={{fontSize:"9px",color:"rgba(255,255,255,.32)"}}>{fmt(INJECTION_THRESHOLD)}</span>
              </div>
              {isDigesting&&(
                <div style={{marginTop:"8px",display:"flex",alignItems:"center",gap:"6px",fontSize:"11px",color:"rgba(255,255,255,.55)"}}>
                  <div style={{width:"6px",height:"6px",borderRadius:"50%",background:"#4A9EDB",animation:"chargePulse 1s ease infinite"}}/>
                  Alimentation cuve : <strong style={{color:"#6DB5EC"}}>{fmt(bmPerHour)}/h</strong>
                  {bmPerHour>0&&!canConnect&&<span style={{color:"rgba(255,255,255,.35)"}}>· encore {fmtETA(buffer,INJECTION_THRESHOLD,bmPerHour)}</span>}
                </div>
              )}
            </div>
          )}

          {/* Chaîne équipements */}
          <div style={{marginTop:"14px",borderRadius:"18px",overflow:"hidden",border:"1px solid rgba(74,158,219,.14)",background:"rgba(11,22,35,.55)"}}>

              <div>
                <div style={{fontSize:"12px",fontWeight:700,color:"rgba(255,255,255,.82)"}}>🔌 Chaîne d'injection réseau GRDF</div>
                <div style={{fontSize:"10px",color:"rgba(255,255,255,.35)",marginTop:"2px"}}>Seuil de raccordement : {fmt(INJECTION_THRESHOLD)}</div>
              </div>
              {injected?<span style={{fontSize:"11px",fontWeight:700,color:"#4A9EDB",padding:"3px 10px",borderRadius:"20px",background:"rgba(74,158,219,.17)"}}>✅ Raccordé</span>:<span style={{fontSize:"11px",fontWeight:700,color:canConnect?"#F5BE50":"rgba(255,255,255,.32)",padding:"3px 10px",borderRadius:"20px",background:canConnect?"rgba(232,160,32,.18)":"rgba(74,158,219,.06)"}}>{canConnect?"🔓 Prêt !":"🔒 Verrouillé"}</span>}
            </div>
            <div style={{padding:"10px 0 4px"}}>
              <PipelineGraphic injected={injected} epurateurOk={epurateurOk} compresseurOk={compresseurOk} unlockAnim={unlockAnim} bufferPct={bufferPct} buffer={buffer}/>
            </div>
            {!injected&&(
              <div style={{padding:"4px 12px 14px",display:"flex",flexDirection:"column",gap:"8px"}}>
                <UnlockButton label="🧪 Débloquer l'Épurateur" sublabel="Débloque : Biodéchets + Boues STEP" condition={canUnlockEpurateur} done={epurateurOk} animating={unlockAnim==="epurateur"} locked={epurateurOk} reqLabel={!epurateurOk&&!canUnlockEpurateur?`${fmt(Math.max(0,200-buffer))} m³ requis`:null} onClick={handleUnlockEpurateur} color="#5544CC"/>
                <UnlockButton label="🔩 Débloquer le Compresseur" sublabel="Débloque : Déchets industriels" condition={canUnlockCompresseur} done={compresseurOk} animating={unlockAnim==="compresseur"} locked={!epurateurOk} reqLabel={!compresseurOk&&epurateurOk&&!canUnlockCompresseur?`${fmt(Math.max(0,350-buffer))} m³ requis`:!epurateurOk?"Épurateur requis":null} onClick={handleUnlockCompresseur} color="#CC7700"/>
                <UnlockButton label="🏗️ Raccorder au réseau GRDF" sublabel={`500 m³ + Épurateur + Compresseur + ⚙️ Déchets industriels${owned[4]<1?" ← manquant":""}`} condition={canConnect} done={false} animating={unlockAnim==="injection"} locked={!compresseurOk} reqLabel={!compresseurOk?"Compresseur requis":owned[4]<1?"⚙️ Déchets industriels requis":buffer<INJECTION_THRESHOLD?`${fmt(Math.max(0,INJECTION_THRESHOLD-buffer))} m³ requis`:null} onClick={handleConnect} color="#2A7DBB" highlight/>
              </div>
            )}
            {injected&&(
              <div style={{padding:"6px 14px 14px",display:"flex",alignItems:"center",gap:"10px"}}>
                <div style={{fontSize:"20px"}}>🔌</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:"11px",color:"rgba(255,255,255,.48)"}}>Injection réseau GRDF en cours</div>
                  <div style={{height:"5px",borderRadius:"3px",background:"rgba(74,158,219,.12)",marginTop:"5px",overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:"3px",width:`${Math.min(100,(burnRate/300)*100)}%`,background:"linear-gradient(90deg,#2A7DBB,#6DB5EC)",transition:"width .5s"}}/>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:"15px",fontWeight:800,color:"#4A9EDB"}}>{fmt(bm)}</div>
                  <div style={{fontSize:"10px",color:"rgba(255,255,255,.35)"}}>injectés</div>
                </div>
              </div>
            )}
          </div>

          {/* ── SECTION GNV ── */}
          {injected&&(
            <GnvSection
              gnvStations={gnvStations}
              gnvSplit={gnvSplit}
              setGnvSplit={setGnvSplit}
              gnvBm={gnvBm}
              bm={bm}
              tractorGnv={tractorGnv}
              bmPerHour={bmPerHour}
              onBuyStation={handleBuyGnvStation}
              onBuyTractor={handleBuyTractorGnv}
            />
          )}

          {/* ── SECTION AGRANDISSEMENT ── */}
          {injected && (
            <AgrandissementSection
              digesteurs={digesteurs}
              bm={bm}
              bmPerHour={bmPerHour}
              chargePct={chargePct}
              chargeMaxEff={chargeMaxEff}
              onBuy={handleBuyDigesteur}
            />
          )}

          {/* Tuto */}
          {tutStep<3&&(
            <div style={{marginTop:"14px",borderRadius:"14px",overflow:"hidden",border:`1px solid ${tutStep===2?"rgba(74,158,219,.55)":"rgba(232,160,32,.4)"}`,background:tutStep===2?"rgba(74,158,219,.09)":"rgba(232,160,32,.08)"}}>
              <div style={{display:"flex",gap:"6px",padding:"10px 16px 0",alignItems:"center"}}>
                {[0,1,2].map(i=>(<div key={i} style={{width:i<tutStep?"22px":"8px",height:"8px",borderRadius:"4px",background:i<tutStep?"#4A9EDB":i===tutStep?"#F5BE50":"rgba(255,255,255,.1)",transition:"all .4s"}}/>))}
                <span style={{fontSize:"10px",color:"rgba(255,255,255,.45)",marginLeft:"4px"}}>Étape {tutStep+1}/3</span>
              </div>
              <div style={{padding:"10px 16px 14px"}}>
                {tutStep===0&&<><div style={{fontSize:"13px",fontWeight:700,color:"#F5BE50"}}>🎁 Tu reçois <strong>1 m³</strong> de biométhane pour démarrer !</div><div style={{fontSize:"12px",color:"rgba(253,224,71,.6)",marginTop:"6px",lineHeight:1.7}}>👆 Va dans <strong style={{color:"#F5BE50"}}>⬆️ Achats</strong> et achète ta première source d'intrants.</div><button onClick={()=>{setTab("upgrades");setTutStep(1);}} style={{marginTop:"10px",padding:"9px 18px",borderRadius:"10px",border:"none",background:"linear-gradient(135deg,#C07800,#E8A020)",color:"white",fontWeight:800,fontSize:"13px",cursor:"pointer",boxShadow:"0 4px 16px rgba(232,160,32,.45)"}}>⬆️ Aller dans Achats →</button></>}
                {tutStep===1&&<><div style={{fontSize:"13px",fontWeight:700,color:"#F5BE50"}}>🐄 Achète du <strong>Lisier bovin</strong> pour démarrer !</div><div style={{fontSize:"12px",color:"rgba(253,224,71,.6)",marginTop:"6px",lineHeight:1.7}}>Il coûte <strong style={{color:"#F5BE50"}}>0.5 m³</strong> — tu en as 1 m³. C'est le moment !</div></>}
                {tutStep===2&&<><div style={{fontSize:"13px",fontWeight:700,color:"#6DB5EC"}}>✅ Les déchets arrivent dans le bac d'intrants !</div><div style={{fontSize:"12px",color:"rgba(255,255,255,.62)",marginTop:"6px",lineHeight:1.7}}>Attends que le bac se remplisse, puis clique <strong style={{color:"#6DB5EC"}}>⬇️ Déverser</strong> pour alimenter le digesteur.</div></>}
              </div>
            </div>
          )}
          {tutStep===3&&bm===0&&!injected&&(
            <div style={{marginTop:"14px",padding:"12px 16px",borderRadius:"12px",background:"rgba(74,158,219,.06)",border:"1px solid rgba(74,158,219,.12)",fontSize:"12px",color:"rgba(255,255,255,.55)",lineHeight:1.6}}>
              🎉 Tuto terminé ! Achète d'autres intrants, accumule <strong style={{color:"#4A9EDB"}}>{fmt(INJECTION_THRESHOLD)}</strong> et raccorde-toi au réseau GRDF.
            </div>
          )}
        </div>
      )}

      {/* ══ TAB ACHATS ══ */}
      {tab==="upgrades"&&(
        <ShopTab
          wallet={wallet} owned={owned} buyMulti={buyMulti}
          isUpgradeAvailable={isUpgradeAvailable} bmPerHour={bmPerHour}
          injected={injected} epurateurOk={epurateurOk} compresseurOk={compresseurOk}
          tutStep={tutStep} fmtETA={fmtETA} region={region}
        />
      )}

      {/* ══ TAB CLASSEMENT ══ */}
      {tab==="ranking"&&(
        <RankingTab
          rankTab={rankTab} setRankTab={setRankTab}
          leaderboard={leaderboard} lbLoading={lbLoading}
          lbLastUpdate={lbLastUpdate} lbPrevRanks={lbPrevRanks}
          onRefreshLb={loadLeaderboard}
          regionalStats={regionalStats} regionalLoading={regionalLoading}
          onRefreshRegional={loadRegional}
          username={username} region={region}
          injected={injected} totalScore={totalScore}
          bm={bm} gnvBm={gnvBm}
          SAVE_KEY={SAVE_KEY}
          rtStatus={rtStatus}
        />
      )}
    </div>
  );
}

// ─── UNLOCK BUTTON ────────────────────────────────────────────────────────────
function UnlockButton({ label, sublabel, condition, done, animating, locked, reqLabel, onClick, color, highlight }) {
  if (done) return (
    <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 14px",borderRadius:"11px",background:`${color}15`,border:`1px solid ${color}40`}}>
      <div style={{fontSize:"16px"}}>✅</div>
      <div><div style={{fontSize:"12px",fontWeight:700,color}}>{label}</div><div style={{fontSize:"10px",color:"rgba(255,255,255,.45)",marginTop:"1px"}}>{sublabel}</div></div>
    </div>
  );
  const active = condition && !animating;
  return (
    <button onClick={onClick} disabled={!active} style={{width:"100%",padding:"12px 14px",borderRadius:"11px",border:"none",background:animating?`${color}30`:active?`linear-gradient(135deg,${color}cc,${color})`:`rgba(255,255,255,.09)`,border:`1px solid ${active||animating?color+"60":"rgba(255,255,255,.10)"}`,color:active?"white":"rgba(255,255,255,.3)",cursor:active?"pointer":"not-allowed",textAlign:"left",transition:"all .3s",boxShadow:active&&highlight?`0 4px 20px ${color}50`:"none",animation:active&&highlight?"connectGlow 2s ease infinite":"none",opacity:locked?.4:1}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontWeight:800,fontSize:"13px"}}>{animating?"⚙️ Mise en service...":active?label:`🔒 ${label}`}</span>
        {reqLabel&&!active&&!animating&&<span style={{fontSize:"10px",color:`${color}80`,background:`${color}15`,padding:"2px 8px",borderRadius:"10px",whiteSpace:"nowrap",marginLeft:"8px"}}>{reqLabel}</span>}
      </div>
      <div style={{fontSize:"10px",color:active?"rgba(255,255,255,.6)":"rgba(255,255,255,.3)",marginTop:"3px"}}>{sublabel}</div>
    </button>
  );
}

// ─── PIPELINE GRAPHIC ─────────────────────────────────────────────────────────
function PipelineGraphic({ injected, epurateurOk, compresseurOk, unlockAnim, bufferPct, buffer }) {
  const [tick, setTick] = useState(0);
  useEffect(() => { const id=setInterval(()=>setTick(t=>(t+1)%1000),40); return ()=>clearInterval(id); }, []);
  const act = i => { if(i===0)return buffer>0; if(i===1)return epurateurOk; if(i===2)return compresseurOk; if(i===3)return injected; return false; };
  const anim= i => { if(i===0)return false; if(i===1)return unlockAnim==="epurateur"; if(i===2)return unlockAnim==="compresseur"; if(i===3)return unlockAnim==="injection"; return false; };
  const PY=128, flow=-(tick*0.9)%20, bladeAngle=tick*(act(2)?4:0);
  return (
    <div style={{width:"100%",padding:"0 12px 4px"}}>
      <svg viewBox="0 0 580 175" style={{width:"100%",height:"auto",display:"block"}}>
        <defs>
          <linearGradient id="gTank" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#0098CC" stopOpacity={act(0)?1:.25}/><stop offset="100%" stopColor="#164e63" stopOpacity={act(0)?1:.15}/></linearGradient>
          <linearGradient id="gLiquid" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="rgba(74,188,223,.5)"/><stop offset="100%" stopColor="rgba(74,188,223,.85)"/></linearGradient>
          <linearGradient id="gFilter" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#6d28d9" stopOpacity={act(1)?1:.25}/><stop offset="100%" stopColor="#3b0764" stopOpacity={act(1)?1:.15}/></linearGradient>
          <linearGradient id="gComp" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#BB6600" stopOpacity={act(2)?1:.25}/><stop offset="100%" stopColor="#431407" stopOpacity={act(2)?1:.15}/></linearGradient>
          <linearGradient id="gInj" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#2A7DBB" stopOpacity={act(3)?1:.25}/><stop offset="100%" stopColor="#0A1828" stopOpacity={act(3)?1:.15}/></linearGradient>
          <linearGradient id="gGrdf" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#2A7DBB"/><stop offset="100%" stopColor="#4A9EDB"/></linearGradient>
          <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <clipPath id="tankBody"><rect x="50" y="42" width="50" height="78" rx="3"/></clipPath>
        </defs>
        <rect x="72" y={PY-6} width="468" height="12" rx="6" fill="rgba(74,158,219,.08)" stroke="rgba(74,158,219,.2)" strokeWidth="1"/>
        <rect x="72" y={PY-5} width="468" height="3" rx="2" fill="rgba(255,255,255,.10)"/>
        {injected&&<rect x="72" y={PY-5} width="468" height="10" rx="5" fill="none" stroke="rgba(74,158,219,.55)" strokeWidth="2.5" strokeDasharray="14 9" strokeDashoffset={flow}/>}
        {[0,1,2,3].map(i=>act(i)&&!injected&&(<rect key={i} x={72+i*127} y={PY-5} width="130" height="10" rx="5" fill="none" stroke={["#3AACCC","#5544CC","#CC7700","#3A8ECB"][i]+"99"} strokeWidth="1.5" strokeDasharray="10 7" strokeDashoffset={flow}/>))}
        {/* Cuve tampon */}
        <rect x="72" y="120" width="8" height={PY-120} rx="3" fill={act(0)?"#3AACCC":"rgba(74,188,223,.2)"}/>
        <rect x="50" y="42" width="50" height="78" rx="5" fill="url(#gTank)" stroke={act(0)?"#3AACCC":"rgba(74,188,223,.25)"} strokeWidth="1.5"/>
        <rect x="51" y={42+78*(1-bufferPct)} width="48" height={78*bufferPct} fill="url(#gLiquid)" clipPath="url(#tankBody)"/>
        {bufferPct>0.02&&<ellipse cx="75" cy={42+78*(1-bufferPct)} rx="24" ry="3" fill="rgba(74,188,223,.4)"/>}

                      <span style={{ fontSize: "15px" }}>📊</span>

// ─── TRACTOR SYSTEM ───────────────────────────────────────────────────────────
function TractorSystem({ fillRate, owned }) {
  const WP={spawn:[475,100],loadPt:[390,95],crv1:[268,198],crv2:[148,198],bacPt:[68,150],exitD:[68,228],exitR:[475,228]};
  const phaseRef=useRef('idle'),phaseStartRef=useRef(0),iconRef=useRef('🐄'),ownedRef=useRef(owned),fillRateRef=useRef(fillRate),rafRef=useRef(null),spawnTimerRef=useRef(null);
  useEffect(()=>{ownedRef.current=owned;},[owned]);
  useEffect(()=>{fillRateRef.current=fillRate;},[fillRate]);
  const[d,setD]=useState({visible:false,x:475,y:100,facingLeft:true,trailerTilt:0,isLoaded:false,icon:'🐄'});
  const[loadParts,setLoadParts]=useState([]);
  const[dumpParts,setDumpParts]=useState([]);
  const lerp=(a,b,t)=>a+(b-a)*t,ease=t=>t<.5?2*t*t:-1+(4-2*t)*t,easeP=(p1,p2,t)=>{const e=ease(Math.max(0,Math.min(1,t)));return[lerp(p1[0],p2[0],e),lerp(p1[1],p2[1],e)];};
  const scheduleSpawn=useCallback(()=>{
    if(spawnTimerRef.current)clearTimeout(spawnTimerRef.current);
    const fr=fillRateRef.current; if(fr<=0)return;
    const delay=Math.max(4500,14000-fr*900);
    spawnTimerRef.current=setTimeout(()=>{
      if(phaseRef.current!=='idle')return;
      const active=UPGRADES.filter((_,i)=>ownedRef.current[i]>0);
      if(!active.length){scheduleSpawn();return;}
      const u=active[Math.floor(Math.random()*active.length)];
      iconRef.current=u.icon; phaseRef.current='arrive'; phaseStartRef.current=performance.now();
    },delay);
  },[]);
  useEffect(()=>{ if(fillRate>0&&phaseRef.current==='idle')scheduleSpawn(); return()=>{if(spawnTimerRef.current)clearTimeout(spawnTimerRef.current);}; },[fillRate,scheduleSpawn]);
  useEffect(()=>{
    let loadPid=0,dumpPid=0,lastLoadSpawn=0,lastDumpSpawn=0;
    const loop=(now)=>{
      const phase=phaseRef.current,elapsed=now-phaseStartRef.current,t=elapsed;
      const next=p=>{phaseRef.current=p;phaseStartRef.current=now;};
      if(phase==='idle'){rafRef.current=requestAnimationFrame(loop);return;}
      switch(phase){
        case'arrive':{const dur=2000,p=t/dur,[x,y]=easeP(WP.spawn,WP.loadPt,p);setD({visible:true,x,y,facingLeft:true,trailerTilt:0,isLoaded:false,icon:iconRef.current});if(p>=1)next('loading');break;}
        case'loading':{const dur=2200,p=t/dur;setD({visible:true,x:WP.loadPt[0],y:WP.loadPt[1],facingLeft:true,trailerTilt:0,isLoaded:p>0.55,icon:iconRef.current});if(p<0.85&&now-lastLoadSpawn>260){lastLoadSpawn=now;const id=loadPid++,xOff=(Math.random()-.5)*22;setLoadParts(prev=>[...prev.slice(-5),{id,xOff}]);setTimeout(()=>setLoadParts(prev=>prev.filter(x=>x.id!==id)),750);}if(p>=1){lastLoadSpawn=0;next('travel_a');}break;}
        case'travel_a':{const dur=950,p=t/dur,[x,y]=easeP(WP.loadPt,WP.crv1,p);setD({visible:true,x,y,facingLeft:true,trailerTilt:0,isLoaded:true,icon:iconRef.current});if(p>=1)next('travel_b');break;}
        case'travel_b':{const dur=1500,p=t/dur,[x,y]=easeP(WP.crv1,WP.crv2,p);setD({visible:true,x,y,facingLeft:true,trailerTilt:0,isLoaded:true,icon:iconRef.current});if(p>=1)next('travel_c');break;}
        case'travel_c':{const dur=900,p=t/dur,[x,y]=easeP(WP.crv2,WP.bacPt,p);setD({visible:true,x,y,facingLeft:true,trailerTilt:0,isLoaded:true,icon:iconRef.current});if(p>=1)next('dumping');break;}
        case'dumping':{const dur=2000,p=t/dur,tiltIn=Math.max(0,Math.min(1,(p-0.08)/0.38)),tiltOut=Math.max(0,Math.min(1,(p-0.62)/0.32)),tilt=tiltIn*42-tiltOut*42;setD({visible:true,x:WP.bacPt[0],y:WP.bacPt[1],facingLeft:true,trailerTilt:tilt,isLoaded:p<0.5,icon:iconRef.current});if(p>0.14&&p<0.68&&now-lastDumpSpawn>200){lastDumpSpawn=now;const id=dumpPid++;setDumpParts(prev=>[...prev.slice(-5),{id}]);setTimeout(()=>setDumpParts(prev=>prev.filter(x=>x.id!==id)),850);}if(p>=1){lastDumpSpawn=0;next('depart_a');}break;}
        case'depart_a':{const dur=650,p=t/dur,[x,y]=easeP(WP.bacPt,WP.exitD,p);setD({visible:true,x,y,facingLeft:false,trailerTilt:0,isLoaded:false,icon:iconRef.current});if(p>=1)next('depart_b');break;}
        case'depart_b':{const dur=2200,p=t/dur,[x,y]=easeP(WP.exitD,WP.exitR,p);setD({visible:true,x,y,facingLeft:false,trailerTilt:0,isLoaded:false,icon:iconRef.current});if(p>=1){setD(prev=>({...prev,visible:false}));phaseRef.current='idle';scheduleSpawn();}break;}
        default:break;
      }
      rafRef.current=requestAnimationFrame(loop);
    };
    rafRef.current=requestAnimationFrame(loop);
    return()=>{if(rafRef.current)cancelAnimationFrame(rafRef.current);};
  },[scheduleSpawn]);
  if(!d.visible)return null;
  const{x,y,facingLeft,trailerTilt,isLoaded,icon}=d;
  return(
    <div style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:60,overflow:"visible"}}>
      {loadParts.map(p=>(<div key={p.id} style={{position:"absolute",left:WP.loadPt[0]+22+p.xOff,top:WP.loadPt[1]-38,fontSize:"15px",lineHeight:1,animation:"loadFall .7s cubic-bezier(.4,0,.6,1) forwards",pointerEvents:"none"}}>{icon}</div>))}
      {dumpParts.map(p=>(<div key={p.id} style={{position:"absolute",left:WP.bacPt[0]+28,top:WP.bacPt[1]-8,fontSize:"14px",animation:"dumpFly .82s cubic-bezier(.4,0,.6,1) forwards",pointerEvents:"none"}}>{icon}</div>))}
      {(d.x<440&&d.x>100)&&<div style={{position:"absolute",left:facingLeft?x-5:x+60,top:y-32,fontSize:"11px",opacity:.45,animation:"dustPuff 1.1s ease infinite",pointerEvents:"none"}}>💨</div>}
      <div style={{position:"absolute",left:x,top:y,transform:`translate(-48px,-24px) scaleX(${facingLeft?1:-1})`,transformOrigin:"48px 24px",transition:"none"}}>
        <TractorSVG isLoaded={isLoaded} icon={icon} trailerTilt={trailerTilt}/>
      </div>
    </div>
  );
}

          {intStr.split("").map((digit,i)=>{const isLeading=i<sigStart,isChanging=changed[i];return (<div key={`i${i}`} style={{width:"22px",height:"34px",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden",borderRight:i===5?"2px solid rgba(74,158,219,.32)":"1px solid rgba(74,158,219,.09)",background:isLeading?"rgba(0,0,0,.2)":i>=4?"rgba(74,158,219,.07)":"transparent"}}><div style={{position:"absolute",top:0,left:0,right:0,height:"35%",background:"linear-gradient(180deg,rgba(255,255,255,.035),transparent)",pointerEvents:"none"}}/><span style={{fontFamily:"'Courier New',monospace",fontSize:"19px",fontWeight:900,lineHeight:1,color:isLeading?"rgba(74,158,219,.2)":isChanging?"#A8CCEC":"#6DB5EC",textShadow:isLeading?"none":"0 0 8px rgba(74,158,219,.6)",animation:isChanging&&!isLeading?"digitRollUp .28s ease":"none",display:"block"}}>{digit}</span></div>);})}
          <div style={{width:"10px",height:"34px",display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(74,158,219,.05)",borderRight:"1px solid rgba(74,158,219,.09)"}}><span style={{fontSize:"16px",fontWeight:900,color:"rgba(74,158,219,.6)",fontFamily:"monospace"}}>.</span></div>

          <div style={{padding:"0 8px",display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(11,22,35,.55)"}}><span style={{fontSize:"9px",fontWeight:700,letterSpacing:".06em",color:"rgba(255,255,255,.45)",textTransform:"uppercase"}}>m³</span></div>
        </div>
        <div style={{marginTop:"4px",fontSize:"9px",color:isActive?"rgba(255,255,255,.48)":"rgba(255,255,255,.3)",display:"flex",alignItems:"center",gap:"5px"}}>
          {isActive&&<span style={{display:"inline-block",width:"5px",height:"5px",borderRadius:"50%",background:"#4A9EDB",animation:"chargePulse 1s ease infinite"}}/>}
          {isActive?"Production en cours — déversez pour alimenter":"Digesteur vide — déversez des intrants"}
        </div>
      </div>
    </div>
  );
}

// ─── WASTE PARTICLES ──────────────────────────────────────────────────────────
function WasteParticles({ fillRate, owned }) {
  const[waste,setWaste]=useState([]);
  useEffect(()=>{
    if(fillRate<=0)return;
    const active=UPGRADES.filter((_,i)=>owned[i]>0);
    if(!active.length)return;
    const rate=Math.max(300,2200-fillRate*180);
    const id=setInterval(()=>{const u=active[Math.floor(Math.random()*active.length)];const p={id:uid++,icon:u.icon,x:8+Math.random()*72,dur:.7+Math.random()*.7};setWaste(prev=>[...prev.slice(-25),p]);setTimeout(()=>setWaste(prev=>prev.filter(w=>w.id!==p.id)),(p.dur+.3)*1000);},rate);
    return()=>clearInterval(id);
  },[fillRate,owned]);
  return waste.map(p=>(<div key={p.id} style={{position:"absolute",left:`${p.x}%`,top:0,fontSize:"17px",lineHeight:1,animation:`fallWaste ${p.dur}s cubic-bezier(.4,0,.6,1) forwards`,pointerEvents:"none",zIndex:10}}>{p.icon}</div>));
}

// ─── GNV VEHICLE SYSTEM ───────────────────────────────────────────────────────
const GNV_VEHICLES = ["🚗","🚌","🚚","🚐","🚑"];

function GnvVehicleSystem({ gnvStations, gnvSplit }) {
  const [vehicles, setVehicles] = useState([]);
  const timerRef = useRef(null);

  useEffect(() => {
    // Fréquence : plus gnvSplit est élevé et plus il y a de stations, plus c'est rapide
    const interval = Math.max(1800, 6000 - gnvSplit * 30 - gnvStations * 600);

    const spawn = () => {
      const v = {
        id: uid++,
        icon: GNV_VEHICLES[Math.floor(Math.random() * GNV_VEHICLES.length)],
        phase: "arriving", // arriving | refueling | leaving
        progress: 0,
      };
      setVehicles(prev => [...prev.slice(-4), v]);

      // Transition phases
      setTimeout(() => {
        setVehicles(prev => prev.map(x => x.id===v.id ? {...x, phase:"refueling"} : x));
      }, 1200);
      setTimeout(() => {
        setVehicles(prev => prev.map(x => x.id===v.id ? {...x, phase:"leaving"} : x));
      }, 3200);
      setTimeout(() => {
        setVehicles(prev => prev.filter(x => x.id!==v.id));
      }, 5000);
    };

    timerRef.current = setInterval(spawn, interval);
    return () => clearInterval(timerRef.current);
  }, [gnvStations, gnvSplit]);

  return (
    <div style={{
      position:"relative", height:"72px", borderRadius:"12px",
      background:"rgba(11,22,35,.55)", border:"1px solid rgba(74,200,120,.15)",
      overflow:"hidden", display:"flex", alignItems:"center",
    }}>
      {/* Route */}
      <div style={{position:"absolute",bottom:"16px",left:0,right:0,height:"2px",
        background:"rgba(255,255,255,.08)"}}/>
      <div style={{position:"absolute",bottom:"16px",left:0,right:0,height:"2px",
        background:"rgba(255,255,255,.04)",
        backgroundImage:"repeating-linear-gradient(90deg,rgba(255,255,255,.15) 0,rgba(255,255,255,.15) 12px,transparent 12px,transparent 24px)"}}/>

      {/* Station centrale */}
      <div style={{position:"absolute",left:"50%",transform:"translateX(-50%)",
        top:"6px",textAlign:"center",zIndex:10}}>
        <div style={{fontSize:"22px",filter:"drop-shadow(0 0 8px rgba(74,200,120,.7))"}}>⛽</div>
        <div style={{fontSize:"7px",color:"#4ADB94",fontWeight:700,marginTop:"1px"}}>GNV</div>
      </div>

      {/* Véhicules */}
      {vehicles.map(v => {
        const isLeft  = v.phase === "arriving";
        const isRight = v.phase === "leaving";
        const isMid   = v.phase === "refueling";
        const style = {
          position:"absolute", fontSize:"22px",
          bottom:"18px",
          transition: isMid ? "left 0.8s ease" : "left 1.4s cubic-bezier(.4,0,.2,1)",
          left: isLeft ? "10%" : isMid ? "42%" : "88%",
          filter: isMid ? "drop-shadow(0 0 10px rgba(74,200,120,.95))" : "none",
          transform: isRight ? "scaleX(-1)" : "scaleX(1)",
        };
        return (
          <div key={v.id} style={style}>
            {v.icon}
            {isMid && (
              <div style={{
                position:"absolute", top:"-14px", left:"50%",
                transform:"translateX(-50%)", fontSize:"8px",
                color:"#4ADB94", fontWeight:800, whiteSpace:"nowrap",
                animation:"bufferPulse 0.8s ease infinite",
              }}>⛽ plein !</div>
            )}
          </div>
        );
      })}

      {/* Label débit */}
      <div style={{position:"absolute",top:"6px",right:"10px",
        fontSize:"9px",color:"rgba(74,200,120,.7)",fontWeight:600}}>
        {vehicles.filter(v=>v.phase==="refueling").length > 0 ? "🟢 En service" : "⬤ En attente"}
      </div>
    </div>
  );
}

        <div style={{
          padding:"8px 10px", borderRadius:"9px",
          background:"rgba(255,255,255,.03)", border:"1px solid rgba(255,255,255,.07)",
          fontSize:"10px", color:"rgba(255,255,255,.45)", lineHeight:1.6
        }}>
          💡 En France, les installations de biométhane varient de quelques centaines à plusieurs milliers de m³/h.
          L'agrandissement progressif d'un site existant est souvent plus rentable qu'un nouveau raccordement.
        </div>
      </div>
    </div>
  );
}

// ─── DIGESTEUR SCENE ──────────────────────────────────────────────────────────
// Scène principale avec dézoom animé + N digesteurs côte à côte
function DigesteurScene({
  digesteurs, sceneZoomAnim, bubbles, chargePct, chargeMaxEff, isDigesting,
  bmPerHour, fillRate, owned, stock, stockMax, stockPct, stockColor,
  binRotate, binTransX, pouring, handlePour
}) {
  // Taille du digesteur selon le nombre
  const dSize  = digesteurs === 1 ? 115 : digesteurs === 2 ? 90 : 72;
  const dEmoji = digesteurs === 1 ? "40px" : digesteurs === 2 ? "32px" : "26px";
  const dFSize = digesteurs === 1 ? "9px"  : digesteurs === 2 ? "8px"  : "7px";

  // Scale de la zone digesteurs selon le count (pour le dézoom statique)
  const digesteurZoneScale = digesteurs === 1 ? 1 : digesteurs === 2 ? 0.97 : 0.93;

  return (
    <div style={{
      background:"rgba(11,22,35,.6)",
      border:"1px solid rgba(74,158,219,.14)",
      borderRadius:"20px",
      padding:"22px 14px 18px",
      position:"relative",
      minHeight:"240px",
      animation: sceneZoomAnim ? "dezoom 1.1s cubic-bezier(.22,.68,0,1.2), sceneFlash 1.1s ease" : "none",
    }}>
      <TractorSystem fillRate={fillRate} owned={owned} />

      <div style={{display:"flex", alignItems:"flex-end", gap:"10px"}}>

        {/* ── BAC D'INTRANTS ── */}
        <div style={{flex:"0 0 96px", display:"flex", flexDirection:"column", alignItems:"center", gap:"8px"}}>
          <div style={{fontSize:"10px", color:"rgba(255,255,255,.55)", textTransform:"uppercase", letterSpacing:".05em", textAlign:"center"}}>
            Bac d'intrants
          </div>
          <div style={{
            transformOrigin:"bottom left",
            transform:`rotate(${binRotate}deg) translateX(${binTransX}px)`,
            transition: pouring ? "none" : "transform .4s ease"
          }}>
            <div style={{
              width:"88px", height:"120px", position:"relative",
              background:"linear-gradient(180deg,rgba(11,22,40,.92),rgba(8,16,32,.96))",
              border:`2px solid ${stockColor}`, borderRadius:"6px 6px 14px 14px",
              overflow:"hidden",
              animation: stockPct>=1 ? "blinkBorder .5s ease infinite" : "none",
              transition:"border-color .5s",
              boxShadow:`inset 0 0 20px rgba(11,22,35,.82),0 0 ${stockPct>=.8?20:8}px ${stockColor}33`
            }}>
              <WasteParticles fillRate={fillRate} owned={owned} />
              <div style={{
                position:"absolute", bottom:0, left:0, right:0,
                height:`${stockPct*100}%`,
                background: stockPct>=1
                  ? "linear-gradient(180deg,rgba(224,88,88,.5),rgba(220,38,38,.85))"
                  : stockPct>=.8 ? "linear-gradient(180deg,rgba(220,120,32,.45),rgba(220,100,32,.8))"
                  : stockPct>=.5 ? "linear-gradient(180deg,rgba(234,179,8,.35),rgba(161,98,7,.75))"
                  : "linear-gradient(180deg,rgba(74,158,219,.32),rgba(0,153,68,.8))",
                transition:"height .08s linear,background .6s",
                borderRadius:"0 0 12px 12px"
              }}>
                <div style={{position:"absolute",top:"-5px",left:"-5%",right:"-5%",height:"10px",background:stockColor,opacity:.5,animation:"waveSurface 2.5s ease infinite"}}/>
              </div>
              <div style={{
                position:"absolute", top:"50%", left:"50%",
                transform:"translate(-50%,-50%)", zIndex:20, textAlign:"center",
                color: stockPct>=.8 ? "white" : "rgba(240,253,244,.85)",
                textShadow:"0 1px 6px rgba(0,0,0,.9)"
              }}>
                <div style={{fontSize:"14px", fontWeight:800}}>{Math.round(stockPct*100)}%</div>
                <div style={{fontSize:"8px", opacity:.7, marginTop:"1px"}}>{fmtT(stock)}</div>
                <div style={{fontSize:"7px", opacity:.4}}>/ {fmtT(stockMax)}</div>
              </div>
            </div>
            <div style={{width:"88px", height:"8px", background:"linear-gradient(90deg,rgba(74,158,219,.12),rgba(74,158,219,.28),rgba(74,158,219,.12))", borderRadius:"0 0 8px 8px"}}/>
          </div>
          <div style={{fontSize:"9px", fontWeight:700, textAlign:"center", color:stockPct>=1?"#E05858":stockPct>=.8?"#E07820":"#6DB5EC"}}>
            {stockPct>=1?"🔴 PLEIN !":stockPct>=.8?"🟠 Attention":stockPct>=.5?"🟡 Mi-plein":"🟢 OK"}
          </div>
          <button onClick={handlePour} disabled={pouring||stock<1} style={{
            width:"88px", padding:"9px 0", borderRadius:"10px", border:"none",
            background: stock<1 ? "rgba(74,158,219,.08)" : stockPct>=.8 ? "linear-gradient(135deg,#E04444,#E05858)" : "linear-gradient(135deg,#2A7DBB,#4A9EDB)",
            color: stock<1 ? "rgba(74,158,219,.25)" : "white",
            fontWeight:800, fontSize:"11px",
            cursor: stock<1 ? "not-allowed" : "pointer",
            boxShadow: stock>=1 ? "0 4px 18px rgba(74,158,219,.38)" : "none",
            transition:"background .3s"
          }}>
            {pouring ? "⏳ ..." : "⬇️ Déverser"}
          </button>
        </div>

        {/* ── PIPE BAC → DIGESTEURS ── */}
        <div style={{flex:"0 0 28px", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", paddingBottom:"44px"}}>
          <div style={{
            width:"24px", height:"10px", borderRadius:"5px",
            background: pouring ? "linear-gradient(90deg,#3A8ECB,#6DB5EC,#3A8ECB)" : "rgba(74,158,219,.14)",
            boxShadow: pouring ? "0 0 14px rgba(74,158,219,.7)" : "none",
            transition:"all .3s", overflow:"hidden", position:"relative"
          }}>
            {pouring && [0,1].map(i => (
              <div key={i} style={{position:"absolute",top:"2px",left:`${15+i*35}%`,width:"6px",height:"5px",borderRadius:"3px",background:"rgba(255,255,255,.5)",animation:`flowDot .6s ease ${i*.2}s infinite`}}/>
            ))}
          </div>
          <div style={{fontSize:"14px", opacity:pouring?1:.25, transition:"opacity .3s", filter:pouring?"drop-shadow(0 0 6px rgba(74,158,219,.8))":"none"}}>→</div>
        </div>

        {/* ── DIGESTEURS (N côte à côte) ── */}
        <div style={{
          flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:"6px",
          transform:`scale(${digesteurZoneScale})`,
          transformOrigin:"center bottom",
          transition:"transform 1s cubic-bezier(.22,.68,0,1.2)"
        }}>
          <div style={{fontSize:"10px", color:"rgba(255,255,255,.55)", textTransform:"uppercase", letterSpacing:".05em"}}>
            Digesteur{digesteurs>1?"s":""} ×{digesteurs}
          </div>

          {/* Rangée de digesteurs */}
          <div style={{display:"flex", gap:digesteurs===3?"4px":"8px", alignItems:"flex-end", justifyContent:"center"}}>
            {Array.from({length:digesteurs}).map((_,di) => (
              <SingleDigesteur
                key={di}
                index={di}
                total={digesteurs}
                dSize={dSize}
                dEmoji={dEmoji}
                dFSize={dFSize}
                bubbles={di===0 ? bubbles : []}
                chargePct={chargePct}
                isDigesting={isDigesting}
                bmPerHour={bmPerHour}
                isNew={di === digesteurs - 1}
              />
            ))}
          </div>

          {/* Barre charge globale + production */}
          <div style={{width:"100%", display:"flex", flexDirection:"column", gap:"5px", marginTop:"2px"}}>
            <div style={{
              background: isDigesting?"rgba(74,158,219,.12)":"rgba(255,255,255,.09)",
              border:`1px solid ${isDigesting?"rgba(74,158,219,.32)":"rgba(255,255,255,.10)"}`,
              borderRadius:"9px", padding:"5px 8px", textAlign:"center", transition:"all .5s"
            }}>
              <div style={{fontSize:"8px", color:"rgba(255,255,255,.55)", textTransform:"uppercase", letterSpacing:".05em"}}>Production totale</div>
              <div style={{
                fontSize:"13px", fontWeight:800,
                color: isDigesting?"#6DB5EC":"rgba(255,255,255,.3)",
                marginTop:"1px",
                animation: isDigesting?"chargePulse 2s ease infinite":"none"
              }}>
                {isDigesting ? fmt(bmPerHour) : "—"}
              </div>
              <div style={{fontSize:"8px", color:"rgba(255,255,255,.35)"}}>par heure</div>
            </div>

            {/* Barre charge */}
            <div style={{padding:"0 2px"}}>
              <div style={{display:"flex", justifyContent:"space-between", marginBottom:"2px"}}>
                <span style={{fontSize:"7px", color:"rgba(255,255,255,.35)"}}>Charge ({digesteurs} digesteur{digesteurs>1?"s":""})</span>
                <span style={{fontSize:"7px", color:"#6DB5EC", fontWeight:700}}>{Math.round(chargePct*100)}%</span>
              </div>
              <div style={{height:"4px", borderRadius:"2px", background:"rgba(74,158,219,.12)", overflow:"hidden"}}>
                <div style={{
                  height:"100%", borderRadius:"2px", width:`${chargePct*100}%`,
                  background: chargePct>.5 ? "linear-gradient(90deg,#2A7DBB,#6DB5EC)" : "linear-gradient(90deg,#7A3000,#FF9900)",
                  transition:"width .3s,background .5s",
                  animation: isDigesting ? "chargePulse 1.5s ease infinite" : "none"
                }}/>
              </div>
            </div>
          </div>

          {!isDigesting && fillRate>0 && (
            <div style={{fontSize:"9px",color:"#E07820",fontWeight:700,textAlign:"center"}}>⚠️ Déversez !</div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── SINGLE DIGESTEUR ────────────────────────────────────────────────────────
function SingleDigesteur({ index, total, dSize, dEmoji, dFSize, bubbles, chargePct, isDigesting, bmPerHour, isNew }) {
  return (
    <div style={{
      display:"flex", flexDirection:"column", alignItems:"center", gap:"4px",
      animation: isNew ? "digesteurAppear 0.8s cubic-bezier(.22,.68,0,1.2) forwards" : "none",
    }}>
      {/* Globe digesteur */}
      <div style={{
        width:`${dSize}px`, height:`${dSize}px`,
        borderRadius:"50%", position:"relative", overflow:"hidden",
        background: isDigesting
          ? "radial-gradient(circle at 35% 30%,#6DB5EC 0%,#3A8ECB 45%,#0A1828 100%)"
          : "radial-gradient(circle at 35% 30%,#1a3d1a 0%,#0d2010 45%,#050a14 100%)",
        boxShadow: isDigesting
          ? `0 0 ${18+chargePct*28}px rgba(74,158,219,${.35+chargePct*.4}), 0 0 ${36+chargePct*36}px rgba(74,158,219,.15)`
          : "0 0 10px rgba(74,158,219,.1)",
        transition:"box-shadow .8s, background 1s",
        animation: isDigesting ? "digestPulse 1.2s ease infinite" : "none",
        flexShrink:0,
      }}>
        {/* Bulles (uniquement sur le premier pour les perf) */}
        {bubbles.map(b => (
          <div key={b.id} style={{
            position:"absolute", bottom:"8%", left:`${b.x}%`,
            width:`${b.size * (dSize/115)}px`, height:`${b.size * (dSize/115)}px`,
            borderRadius:"50%", background:"rgba(134,239,172,.55)",
            animation:`bubbleUp ${b.dur}s ease forwards`, pointerEvents:"none"
          }}/>
        ))}
        {/* Emoji */}
        <div style={{
          position:"absolute", top:"50%", left:"50%",
          transform:"translate(-50%,-55%)",
          fontSize:dEmoji, zIndex:10,
          filter: isDigesting ? "drop-shadow(0 0 10px rgba(74,158,219,.9))" : "grayscale(80%)"
        }}>⚗️</div>
        {/* Niveau charge */}
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:`${chargePct*100}%`,background:"rgba(74,158,219,.2)",transition:"height .3s"}}/>
        {/* Débit sur le 1er digesteur uniquement si 1 seul */}
        {isDigesting && total === 1 && (
          <div style={{position:"absolute",bottom:"6px",left:"50%",transform:"translateX(-50%)",zIndex:10,textAlign:"center",whiteSpace:"nowrap"}}>
            <div style={{fontSize:dFSize,fontWeight:800,color:"#6DB5EC",textShadow:"0 1px 4px rgba(0,0,0,.9)"}}>{fmt(bmPerHour)}/h</div>
          </div>
        )}
      </div>
      {/* Label numéro si plusieurs */}
      {total > 1 && (
        <div style={{fontSize:"8px",color:"rgba(74,158,219,.7)",fontWeight:700}}>#{index+1}</div>
      )}
    </div>
  );
}

// ─── RANKING TAB — Sprint 4 refonte complète ─────────────────────────────────
function RankingTab({
  rankTab, setRankTab, leaderboard, lbLoading, lbLastUpdate, lbPrevRanks,
  onRefreshLb, regionalStats, regionalLoading, onRefreshRegional,
  username, region, injected, totalScore, bm, gnvBm, SAVE_KEY, rtStatus
}) {
  const myEntry  = leaderboard.find(e => e.name === username);
  const myRank   = leaderboard.findIndex(e => e.name === username) + 1;
  const MEDALS   = ["🥇","🥈","🥉"];
  const regionData = GRDF_REGIONS || {};

  const rtColors = {
    connected:    { bg:"rgba(34,197,94,.2)",  dot:"#22c55e", label:"Live"          },
    connecting:   { bg:"rgba(234,179,8,.15)", dot:"#eab308", label:"Connexion…"    },
    disconnected: { bg:"rgba(255,255,255,.06)", dot:"rgba(255,255,255,.25)", label:"Hors-ligne" },
    error:        { bg:"rgba(239,68,68,.15)", dot:"#ef4444", label:"Erreur réseau" },
  };
  const rt = rtColors[rtStatus] || rtColors.disconnected;

  const timeSince = lbLastUpdate
    ? Math.round((Date.now() - lbLastUpdate) / 1000)
